<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Record Sheet</title>
    <link rel="stylesheet" href="/assets/site.css">
</head>
<body class="account-page">
<main class="account-shell">
    <section class="account-intro">
        <div class="account-intro__content">
            <p class="account-intro__eyebrow">Authenticated workspace</p>
            <h1>Record sheet</h1>
            <p>Capture what happened so the next review starts from evidence instead of memory.</p>
            <nav class="account-links" aria-label="Secure navigation">
                <a href="/dashboard">Dashboard</a>
                <a href="/todo-today">Todo today page</a>
                <a href="/activity-inventory">Activity inventory page</a>
            </nav>
            <form class="account-logout" method="get" action="/account/logout">
                <button type="submit">Log out</button>
            </form>
        </div>
        <div class="account-intro__visual" aria-label="Pomodoro visuals">
            <img src="/assets/welcome-pomodoro-technique.jpg" alt="Pomodoro Time image">
            <img src="/assets/welcome-tomato.png" alt="tomato">
        </div>
    </section>

    <section class="account-panel">
        <div class="account-panel__inner">
            <h2>Record sheet page</h2>
            <p class="account-panel__lead">Review outcomes and timing without leaving the secure area.</p>
        </div>
    </section>
</main>
</body>
</html>
